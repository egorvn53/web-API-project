<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Collection Management System</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container">
    <h1 class="mt-5">Personal Collection Management System</h1>
    <form id="itemForm" class="mt-3">
        <div class="form-group">
            <label for="itemName">Item Name:</label>
            <input type="text" class="form-control" id="itemName" required>
        </div>
        <div class="form-group">
            <label for="itemDescription">Description:</label>
            <input type="text" class="form-control" id="itemDescription">
        </div>
        <button type="submit" class="btn btn-primary">Add Item</button>
    </form>
    <hr>
    <h2>Item List</h2>
    <input type="text" id="search" class="form-control" placeholder="Search items..." />
    <table class="table table-bordered mt-2">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="itemTable">
            <!-- Items will be appended here -->
        </tbody>
    </table>
</div>

<script>
    let items = [];
    let itemId = 0;

    $('#itemForm').on('submit', function(event) {
        event.preventDefault();
        const itemName = $('#itemName').val();
        const itemDescription = $('#itemDescription').val();
        itemId++;
        items.push({ id: itemId, name: itemName, description: itemDescription });
        renderTable();
        $('#itemForm')[0].reset();
    });

    function renderTable() {
        const searchValue = $('#search').val().toLowerCase();
        const filteredItems = items.filter(item => item.name.toLowerCase().includes(searchValue));
        const tableBody = $('#itemTable');
        tableBody.empty();
        filteredItems.forEach(item => {
            tableBody.append(`<tr>
                <td>${item.id}</td>
                <td>${item.name}</td>
                <td>${item.description}</td>
                <td>
                    <button class="btn btn-warning btn-sm edit-btn">Edit</button>
                    <button class="btn btn-danger btn-sm delete-btn">Delete</button>
                </td>
            </tr>`);
        });
    }

    $('#search').on('input', renderTable);

    $(document).on('click', '.delete-btn', function() {
        const id = $(this).closest('tr').find('td:first').text();
        items = items.filter(item => item.id != id);
        renderTable();
    });

    $(document).on('click', '.edit-btn', function() {
        const id = $(this).closest('tr').find('td:first').text();
        const item = items.find(item => item.id == id);
        $('#itemName').val(item.name);
        $('#itemDescription').val(item.description);
        items = items.filter(item => item.id != id);
        renderTable();
    });
</script>
</body>
</html>
